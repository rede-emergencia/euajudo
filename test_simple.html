<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Test</title>
</head>
<body>
    <h1>Testing Dashboard</h1>
    <iframe src="http://localhost:3000/shelter-dashboard-v2" width="100%" height="800px"></iframe>
    
    <script>
        // Listen for errors from the iframe
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'error') {
                console.error('Iframe Error:', event.data.message);
            }
        });
        
        // Check if iframe loads
        setTimeout(function() {
            const iframe = document.querySelector('iframe');
            try {
                const doc = iframe.contentDocument || iframe.contentWindow.document;
                console.log('Iframe loaded successfully');
            } catch (e) {
                console.log('Iframe cross-origin (expected)');
            }
        }, 3000);
    </script>
</body>
</html>
